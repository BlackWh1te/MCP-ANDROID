<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="128" height="128" rx="20" fill="#1a1a2e"/>

  <!-- Android head -->
  <g transform="translate(34, 20)">
    <!-- Head shape -->
    <rect x="10" y="20" width="40" height="35" rx="6" fill="#3ddc84"/>
    <!-- Eyes -->
    <circle cx="20" cy="32" r="4" fill="#1a1a2e"/>
    <circle cx="40" cy="32" r="4" fill="#1a1a2e"/>
    <!-- Antenna -->
    <line x1="20" y1="20" x2="16" y2="8" stroke="#3ddc84" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="40" y1="20" x2="44" y2="8" stroke="#3ddc84" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="16" cy="6" r="3" fill="#3ddc84"/>
    <circle cx="44" cy="6" r="3" fill="#3ddc84"/>
  </g>

  <!-- MCP connection symbol -->
  <g transform="translate(24, 75)">
    <circle cx="10" cy="15" r="8" fill="#4a90e2"/>
    <circle cx="40" cy="15" r="8" fill="#4a90e2"/>
    <circle cx="70" cy="15" r="8" fill="#4a90e2"/>
    <line x1="18" y1="15" x2="32" y2="15" stroke="#4a90e2" stroke-width="3"/>
    <line x1="48" y1="15" x2="62" y2="15" stroke="#4a90e2" stroke-width="3"/>
  </g>

  <!-- Frida accent -->
  <rect x="44" y="105" width="40" height="12" rx="3" fill="#50c878"/>
</svg>