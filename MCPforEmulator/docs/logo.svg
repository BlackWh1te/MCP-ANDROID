<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#1a1a2e" stroke="#4a90e2" stroke-width="4"/>

  <!-- Android robot head silhouette -->
  <g transform="translate(50, 40)">
    <!-- Head -->
    <rect x="20" y="30" width="60" height="50" rx="8" fill="#3ddc84"/>
    <!-- Eyes -->
    <circle cx="35" cy="45" r="6" fill="#1a1a2e"/>
    <circle cx="65" cy="45" r="6" fill="#1a1a2e"/>
    <!-- Antenna -->
    <line x1="35" y1="30" x2="30" y2="15" stroke="#3ddc84" stroke-width="3" stroke-linecap="round"/>
    <line x1="65" y1="30" x2="70" y2="15" stroke="#3ddc84" stroke-width="3" stroke-linecap="round"/>
    <circle cx="30" cy="12" r="4" fill="#3ddc84"/>
    <circle cx="70" cy="12" r="4" fill="#3ddc84"/>
  </g>

  <!-- MCP connection lines -->
  <g stroke="#4a90e2" stroke-width="2" fill="none">
    <path d="M 20 100 Q 50 80, 80 100"/>
    <path d="M 80 100 Q 110 80, 140 100"/>
    <path d="M 140 100 Q 170 80, 180 100"/>
  </g>

  <!-- Frida branding element -->
  <g transform="translate(60, 110)">
    <rect x="0" y="0" width="80" height="40" rx="5" fill="#50c878"/>
    <text x="40" y="25" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">FRIDA</text>
  </g>

  <!-- Circuit patterns -->
  <g stroke="#4a90e2" stroke-width="1" fill="none" opacity="0.6">
    <circle cx="30" cy="170" r="3"/>
    <circle cx="170" cy="170" r="3"/>
    <line x1="30" y1="170" x2="50" y2="170"/>
    <line x1="150" y1="170" x2="170" y2="170"/>
    <rect x="50" y="165" width="100" height="10" rx="2" stroke="#4a90e2" fill="none"/>
  </g>

  <!-- MCP text -->
  <text x="100" y="185" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#4a90e2" text-anchor="middle">MCP</text>
</svg>