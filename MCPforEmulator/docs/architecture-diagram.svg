<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="600" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">MCP Frida Android Server Architecture</text>

  <!-- MCP Client -->
  <rect x="300" y="70" width="200" height="60" rx="10" fill="#4a90e2" stroke="#357abd" stroke-width="2"/>
  <text x="400" y="105" font-family="Arial, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle">MCP Client</text>

  <!-- Arrow down -->
  <line x1="400" y1="130" x2="400" y2="170" stroke="#ffffff" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="420" y="155" font-family="Arial, sans-serif" font-size="12" fill="#ffffff">MCP Protocol</text>

  <!-- MCP Server -->
  <rect x="250" y="170" width="300" height="80" rx="10" fill="#50c878" stroke="#3a9b5c" stroke-width="2"/>
  <text x="400" y="200" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">MCP Server</text>
  <text x="400" y="225" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">(Rust + rmcp)</text>

  <!-- Arrows splitting -->
  <line x1="400" y1="250" x2="400" y2="290" stroke="#ffffff" stroke-width="2"/>
  <line x1="400" y1="290" x2="150" y2="330" stroke="#ffffff" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="400" y1="290" x2="400" y2="330" stroke="#ffffff" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="400" y1="290" x2="650" y2="330" stroke="#ffffff" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- ADB Bridge -->
  <rect x="50" y="330" width="200" height="60" rx="10" fill="#ff6b6b" stroke="#cc5555" stroke-width="2"/>
  <text x="150" y="365" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">ADB Bridge</text>

  <!-- Frida Bridge -->
  <rect x="300" y="330" width="200" height="60" rx="10" fill="#9b59b6" stroke="#7d3c98" stroke-width="2"/>
  <text x="400" y="365" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">Frida Bridge</text>

  <!-- Tools Layer -->
  <rect x="550" y="330" width="200" height="60" rx="10" fill="#f39c12" stroke="#d68910" stroke-width="2"/>
  <text x="650" y="365" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">Tools Layer</text>

  <!-- Arrows down from bridges -->
  <line x1="150" y1="390" x2="150" y2="450" stroke="#ffffff" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="400" y1="390" x2="400" y2="450" stroke="#ffffff" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Android Device -->
  <rect x="50" y="450" width="200" height="80" rx="10" fill="#3498db" stroke="#2980b9" stroke-width="2"/>
  <text x="150" y="485" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">Android Device</text>
  <text x="150" y="505" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">/ Emulator</text>

  <!-- Frida CLI/Server -->
  <rect x="300" y="450" width="200" height="80" rx="10" fill="#1abc9c" stroke="#16a085" stroke-width="2"/>
  <text x="400" y="485" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">Frida CLI</text>
  <text x="400" y="505" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">/ Server</text>

  <!-- Legend -->
  <rect x="580" y="500" width="200" height="90" rx="5" fill="#2d2d44" stroke="#444466" stroke-width="1"/>
  <text x="680" y="520" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Legend</text>
  
  <rect x="590" y="530" width="15" height="15" fill="#4a90e2"/>
  <text x="615" y="542" font-family="Arial, sans-serif" font-size="10" fill="#ffffff">Client</text>
  
  <rect x="590" y="550" width="15" height="15" fill="#50c878"/>
  <text x="615" y="562" font-family="Arial, sans-serif" font-size="10" fill="#ffffff">Server</text>
  
  <rect x="590" y="570" width="15" height="15" fill="#ff6b6b"/>
  <text x="615" y="582" font-family="Arial, sans-serif" font-size="10" fill="#ffffff">Bridge</text>

  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ffffff"/>
    </marker>
  </defs>
</svg>