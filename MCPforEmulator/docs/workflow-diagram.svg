<svg width="900" height="500" viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="500" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="450" y="30" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">MCP Server Workflow</text>

  <!-- Step 1: Device Connection -->
  <rect x="50" y="80" width="150" height="60" rx="8" fill="#4a90e2" stroke="#357abd" stroke-width="2"/>
  <text x="125" y="105" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">1. Connect Device</text>
  <text x="125" y="125" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">ADB + Frida</text>

  <!-- Arrow -->
  <line x1="200" y1="110" x2="250" y2="110" stroke="#ffffff" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 2: List Processes -->
  <rect x="250" y="80" width="150" height="60" rx="8" fill="#50c878" stroke="#3a9b5c" stroke-width="2"/>
  <text x="325" y="105" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">2. List Processes</text>
  <text x="325" y="125" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">Get target PID</text>

  <!-- Arrow -->
  <line x1="400" y1="110" x2="450" y2="110" stroke="#ffffff" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 3: Attach Process -->
  <rect x="450" y="80" width="150" height="60" rx="8" fill="#9b59b6" stroke="#7d3c98" stroke-width="2"/>
  <text x="525" y="105" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">3. Attach Process</text>
  <text x="525" y="125" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">Frida injection</text>

  <!-- Arrow -->
  <line x1="600" y1="110" x2="650" y2="110" stroke="#ffffff" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 4: Inject Bypass -->
  <rect x="650" y="80" width="150" height="60" rx="8" fill="#f39c12" stroke="#d68910" stroke-width="2"/>
  <text x="725" y="105" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">4. Inject Bypass</text>
  <text x="725" y="125" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">Anti-detection</text>

  <!-- Branching arrows -->
  <line x1="725" y1="140" x2="725" y2="180" stroke="#ffffff" stroke-width="2"/>
  <line x1="725" y1="180" x2="200" y2="220" stroke="#ffffff" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="725" y1="180" x2="450" y2="220" stroke="#ffffff" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="725" y1="180" x2="700" y2="220" stroke="#ffffff" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Memory Operations -->
  <rect x="100" y="220" width="200" height="50" rx="8" fill="#ff6b6b" stroke="#cc5555" stroke-width="2"/>
  <text x="200" y="250" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Memory Operations</text>

  <!-- Script Execution -->
  <rect x="350" y="220" width="200" height="50" rx="8" fill="#1abc9c" stroke="#16a085" stroke-width="2"/>
  <text x="450" y="250" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Script Execution</text>

  <!-- Function Tracing -->
  <rect x="600" y="220" width="200" height="50" rx="8" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
  <text x="700" y="250" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Function Tracing</text>

  <!-- Converging arrows -->
  <line x1="200" y1="270" x2="400" y2="320" stroke="#ffffff" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="450" y1="270" x2="450" y2="320" stroke="#ffffff" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="700" y1="270" x2="500" y2="320" stroke="#ffffff" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Results -->
  <rect x="350" y="320" width="200" height="50" rx="8" fill="#34495e" stroke="#2c3e50" stroke-width="2"/>
  <text x="450" y="350" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Results & Analysis</text>

  <!-- Final arrow -->
  <line x1="450" y1="370" x2="450" y2="420" stroke="#ffffff" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Output -->
  <rect x="350" y="420" width="200" height="50" rx="8" fill="#2ecc71" stroke="#27ae60" stroke-width="2"/>
  <text x="450" y="450" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Output to MCP Client</text>

  <!-- Legend -->
  <rect x="50" y="420" width="150" height="70" rx="5" fill="#2d2d44" stroke="#444466" stroke-width="1"/>
  <text x="125" y="440" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">Legend</text>
  <rect x="60" y="450" width="12" height="12" fill="#4a90e2"/>
  <text x="80" y="460" font-family="Arial, sans-serif" font-size="9" fill="#ffffff">Setup</text>
  <rect x="60" y="465" width="12" height="12" fill="#50c878"/>
  <text x="80" y="475" font-family="Arial, sans-serif" font-size="9" fill="#ffffff">Operations</text>

  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ffffff"/>
    </marker>
  </defs>
</svg>